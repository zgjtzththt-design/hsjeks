workflows:
  android-build-release:
    name: Build Release APK
    instance_type: linux
    max_build_duration: 120
    environment:
      vars:
        GRADLE_OPTS: "-Xmx3072m"
      java: Java 11
    scripts:
      - name: Set up environment
        script: |
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
          echo "Environment configured"
      - name: Build unsigned APK
        script: |
          ./gradlew assembleRelease --no-daemon
      - name: Sign APK with debug key
        script: |
          cd app/build/outputs/apk/release/
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -keypass android \
            app-release-unsigned.apk androiddebugkey
          mv app-release-unsigned.apk app-release-signed.apk
      - name: Verify APK signature
        script: |
          cd app/build/outputs/apk/release/
          jarsigner -verify -verbose app-release-signed.apk
    artifacts:
      - app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - $DEVELOPER_EMAIL
        notify:
          success: true
          failure: true

  android-build-debug:
    name: Build Debug APK
    instance_type: linux
    max_build_duration: 60
    environment:
      vars:
        GRADLE_OPTS: "-Xmx3072m"
      java: Java 11
    scripts:
      - name: Set up environment
        script: |
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
      - name: Build debug APK
        script: |
          ./gradlew assembleDebug --no-daemon
      - name: Run unit tests
        script: |
          ./gradlew test --no-daemon || true
    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/reports/tests/**
