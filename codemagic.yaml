workflows:
  android-build-release:
    name: Build Release APK
    instance_type: linux
    max_build_duration: 120
    environment:
      vars:
        GRADLE_OPTS: "-Xmx3072m"
        DEVELOPER_EMAIL: "developer@example.com"
      java: Java 11
    scripts:
      - name: Set up environment
        script: |
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
          echo "Environment configured"
      - name: Build unsigned APK
        script: |
          ./gradlew assembleRelease --no-daemon
      - name: Sign APK with debug key
        script: |
          cd app/build/outputs/apk/release/
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -keypass android \
            app-release-unsigned.apk androiddebugkey
          mv app-release-unsigned.apk app-release-signed.apk
      - name: Verify APK signature
        script: |
          cd app/build/outputs/apk/release/
          jarsigner -verify -verbose app-release-signed.apk
      - name: Create project bundle
        script: |
          mkdir -p build/bundle
          zip -r build/bundle/project-bundle.zip . \
            -x "*.gradle/*" \
            ".gradle/*" \
            "build/*" \
            ".git/*" \
            ".gitignore" \
            "node_modules/*" \
            ".DS_Store"
          echo "Project bundle created successfully at build/bundle/project-bundle.zip"
    artifacts:
      - app/build/outputs/apk/release/*.apk
      - build/bundle/*.zip
    publishing:
      email:
        recipients:
          - $DEVELOPER_EMAIL
        notify:
          success: true
          failure: true

  android-build-debug:
    name: Build Debug APK
    instance_type: linux
    max_build_duration: 60
    environment:
      vars:
        GRADLE_OPTS: "-Xmx3072m"
      java: Java 11
    scripts:
      - name: Set up environment
        script: |
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
      - name: Build debug APK
        script: |
          ./gradlew assembleDebug --no-daemon
      - name: Run unit tests
        script: |
          ./gradlew test --no-daemon || true
      - name: Create project bundle
        script: |
          mkdir -p build/bundle
          zip -r build/bundle/project-bundle.zip . \
            -x "*.gradle/*" \
            ".gradle/*" \
            "build/*" \
            ".git/*" \
            ".gitignore" \
            "node_modules/*" \
            ".DS_Store"
          echo "Project bundle created successfully"
    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/reports/tests/**
      - build/bundle/*.zip
